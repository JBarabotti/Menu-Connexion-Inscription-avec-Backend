<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" href="connexion.css">
</head>
<body>

    <section>
        <h1>Connexion</h1>
        <form action="">
            <div class="input-box">
                <input type="email" placeholder="Entrez votre email *" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Entrez votre mot de passe *" required>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox"> Se souvenir de moi</label>
                <a id="forgot" href="#">Mot de passe oublié ?</a>
            </div>
            <button class="login-btn" type="submit">Se connecter</button>
        </form>
        
        <div class="register-link">
            <p>Pas de compte ? <a href="index.html">Inscription</a></p>
        </div>
    </section>

    <script src="connexion.js"></script>
    
</body>
</html>
